<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>룩옵티컬 — 얼굴형 선글라스 가이드</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grain"></div>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="logo">LOOKOPTICAL</div>
    <div class="header-tagline">Luxury Eyewear · 얼굴형 선글라스 가이드</div>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-eyebrow">Face Shape Finder</div>
  <h1 class="hero-title">당신의 얼굴형에<br><em>완벽한 선글라스</em></h1>
  <p class="hero-sub">얼굴형을 선택하면 룩옵티컬이 엄선한<br>럭셔리 브랜드 & 프레임을 추천해드립니다</p>
  <div class="scroll-cue">얼굴형 선택 ↓</div>
</section>

<!-- FACE SELECTOR -->
<section class="selector-section">
  <div class="selector-label">YOUR FACE SHAPE</div>
  <div class="face-grid">

    <button class="face-btn" data-face="oval" onclick="selectFace('oval',this)">
      <div class="face-svg-wrap">
        <svg viewBox="0 0 80 100" fill="none">
          <ellipse cx="40" cy="50" rx="27" ry="37" stroke="currentColor" stroke-width="1.5"/>
          <line x1="40" y1="13" x2="40" y2="87" stroke="currentColor" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.35"/>
          <line x1="13" y1="50" x2="67" y2="50" stroke="currentColor" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.35"/>
        </svg>
      </div>
      <span class="face-name">Oval</span>
      <span class="face-name-ko">계란형</span>
    </button>

    <button class="face-btn" data-face="round" onclick="selectFace('round',this)">
      <div class="face-svg-wrap">
        <svg viewBox="0 0 80 100" fill="none">
          <circle cx="40" cy="50" r="29" stroke="currentColor" stroke-width="1.5"/>
          <line x1="11" y1="50" x2="69" y2="50" stroke="currentColor" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.35"/>
          <line x1="40" y1="21" x2="40" y2="79" stroke="currentColor" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.35"/>
        </svg>
      </div>
      <span class="face-name">Round</span>
      <span class="face-name-ko">둥근형</span>
    </button>

    <button class="face-btn" data-face="square" onclick="selectFace('square',this)">
      <div class="face-svg-wrap">
        <svg viewBox="0 0 80 100" fill="none">
          <rect x="11" y="17" width="58" height="66" rx="7" stroke="currentColor" stroke-width="1.5"/>
          <line x1="11" y1="50" x2="69" y2="50" stroke="currentColor" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.35"/>
        </svg>
      </div>
      <span class="face-name">Square</span>
      <span class="face-name-ko">각진형</span>
    </button>

    <button class="face-btn" data-face="heart" onclick="selectFace('heart',this)">
      <div class="face-svg-wrap">
        <svg viewBox="0 0 80 100" fill="none">
          <path d="M40 85 C40 85 10 62 10 34 C10 22 18 14 28 16 C34 17 38 21 40 25 C42 21 46 17 52 16 C62 14 70 22 70 34 C70 62 40 85 40 85Z" stroke="currentColor" stroke-width="1.5"/>
          <line x1="10" y1="30" x2="70" y2="30" stroke="currentColor" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.35"/>
        </svg>
      </div>
      <span class="face-name">Heart</span>
      <span class="face-name-ko">하트형</span>
    </button>

    <button class="face-btn" data-face="oblong" onclick="selectFace('oblong',this)">
      <div class="face-svg-wrap">
        <svg viewBox="0 0 80 100" fill="none">
          <ellipse cx="40" cy="50" rx="21" ry="39" stroke="currentColor" stroke-width="1.5"/>
          <line x1="40" y1="11" x2="40" y2="89" stroke="currentColor" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.35"/>
        </svg>
      </div>
      <span class="face-name">Oblong</span>
      <span class="face-name-ko">긴형</span>
    </button>

    <button class="face-btn" data-face="diamond" onclick="selectFace('diamond',this)">
      <div class="face-svg-wrap">
        <svg viewBox="0 0 80 100" fill="none">
          <path d="M40 10 L68 44 L40 90 L12 44 Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <line x1="12" y1="44" x2="68" y2="44" stroke="currentColor" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.35"/>
        </svg>
      </div>
      <span class="face-name">Diamond</span>
      <span class="face-name-ko">다이아형</span>
    </button>

    <button class="face-btn" data-face="small" onclick="selectFace('small',this)">
      <div class="face-svg-wrap">
        <svg viewBox="0 0 80 100" fill="none">
          <ellipse cx="40" cy="52" rx="18" ry="24" stroke="currentColor" stroke-width="1.5"/>
          <ellipse cx="40" cy="52" rx="30" ry="38" stroke="currentColor" stroke-width="0.7" stroke-dasharray="3 3" opacity="0.2"/>
          <line x1="22" y1="52" x2="58" y2="52" stroke="currentColor" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.35"/>
          <text x="40" y="17" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.45" font-family="sans-serif" letter-spacing="1">XS</text>
        </svg>
      </div>
      <span class="face-name">Small</span>
      <span class="face-name-ko">소형 얼굴</span>
    </button>

    <button class="face-btn" data-face="large" onclick="selectFace('large',this)">
      <div class="face-svg-wrap">
        <svg viewBox="0 0 80 100" fill="none">
          <ellipse cx="40" cy="52" rx="34" ry="42" stroke="currentColor" stroke-width="1.5"/>
          <ellipse cx="40" cy="52" rx="20" ry="27" stroke="currentColor" stroke-width="0.7" stroke-dasharray="3 3" opacity="0.2"/>
          <line x1="6" y1="52" x2="74" y2="52" stroke="currentColor" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.35"/>
          <text x="40" y="11" text-anchor="middle" font-size="9" fill="currentColor" opacity="0.45" font-family="sans-serif" letter-spacing="1">XL</text>
        </svg>
      </div>
      <span class="face-name">Large</span>
      <span class="face-name-ko">대형 얼굴</span>
    </button>

  </div>
</section>

<!-- RESULT -->
<section class="result-section" id="resultSection">
  <div class="result-wrap">

    <div class="result-top">
      <div class="result-eyebrow" id="resultEyebrow"></div>
      <h2 class="result-heading" id="resultHeading"></h2>
      <p class="result-desc" id="resultDesc"></p>
    </div>

    <div class="result-cols">

      <!-- LEFT: 추천 프레임 -->
      <div class="result-col">
        <div class="col-label">추천 프레임 형태</div>
        <div class="frames-list" id="framesList"></div>
        <div class="avoid-wrap">
          <div class="avoid-label">⚠ 피해야 할 스타일</div>
          <div class="avoid-text" id="avoidText"></div>
        </div>
      </div>

      <!-- RIGHT: 브랜드 추천 -->
      <div class="result-col">
        <div class="col-label">룩옵티컬 추천 브랜드</div>
        <div class="brand-grid" id="brandGrid"></div>
      </div>

    </div>

    <div class="cta-row">
      <div class="cta-text">매장 방문 시 얼굴형 맞춤 피팅 서비스를 무료로 제공합니다</div>
      <button class="cta-btn" onclick="resetAll()">← 다시 선택</button>
    </div>

  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-logo">LOOKOPTICAL</div>
  <div class="footer-note">럭셔리 아이웨어 전문점 · 백화점 단독 취급 · 얼굴형 맞춤 상담</div>
</footer>

<script src="script.js"></script>
</body>
</html>
